<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список задач</title>
    <link rel="stylesheet" href="style.css">
</head><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<body>
    <div class="container" id="loginBox">
    <h1>Вход</h1>
    <input type="email" id="emailInput" placeholder="Email">
    <input type="password" id="passwordInput" placeholder="Пароль">
    <button id="loginBtn">Войти</button>
    <p id="loginError" style="color: red;"></p>
</div>
<div class="container" id="appBox" style="display: none;">
  <p id="roleGreeting"></p>

    <div id="managerView" style="display: none;">
        <h2>Поставить задачу</h2>
        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Введите задачу...">
            <input type="date" id="dateInput">
            <select id="employeeSelect"></select>
            <button id="addBtn">Добавить</button>
        </div>
        <ul id="managerTaskList"></ul>
    </div>

    <div id="employeeView" style="display: none;">
        <p id="counter">Выполнено: 0 из 0</p>
        <ul id="taskList"></ul>
    </div>  
    </div>
    <script src="script.js"></script>
</body>
</html>
